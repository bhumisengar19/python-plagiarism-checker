<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAGIX | Living Interface</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-theme="light">
    <!-- Subtle Interaction Glow -->
    <div class="mouse-glow"></div>

    <!-- Fixed Atmosphere Layer -->
    <div class="sky-background">
        <div class="celestial-body"></div>
        <div class="clouds-container">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>
        <div class="stars-container" id="starsLayer"></div>
        <div class="birds-container">
            <div class="bird bird-1"></div>
            <div class="bird bird-2"></div>
            <div class="bird bird-3"></div>
        </div>
    </div>

    <!-- Scrollable UI Layer -->
    <div class="app-wrapper">
        <nav class="top-navbar">
            <a href="/" class="brand">
                <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- The Background Circle (Dark part) -->
                    <circle cx="50" cy="50" r="45" fill="currentColor"/>
                    
                    <!-- The Ghost Body (White part) -->
                    <path d="M50 25 C30 25 28 45 28 65 C30 90 45 92 50 92 C55 92 68 85 70 80 C80 65 72 45 72 35 C72 25 60 25 50 25 Z" fill="var(--logo-bg)"/>
                    
                    <!-- The Eyes (Dark part) -->
                    <ellipse cx="43" cy="40" rx="3.5" ry="7" fill="currentColor"/>
                    <ellipse cx="55" cy="40" rx="3.5" ry="7" fill="currentColor"/>
                    
                    <!-- Left Hand (White part) -->
                    <path d="M22 65 C20 62 16 65 15 68 C14 71 16 75 16 75 C16 75 19 80 23 78 C25 76 25 72 25 72 Z" fill="var(--logo-bg)"/>
                    <!-- Right Hand (White part) -->
                    <path d="M68 62 C70 60 74 62 75 65 C76 68 74 72 74 72 C74 72 71 77 67 75 C65 73 65 69 65 69 Z" fill="var(--logo-bg)"/>

                    <!-- The Book Covering the Ghost (Dark part) -->
                    <path d="M15 55 L40 65 V95 L15 80 Z" fill="currentColor"/>
                    <path d="M42 65 L68 55 L68 80 L42 95 Z" fill="currentColor"/>
                    
                    <!-- Book Pages Top Edge (White accent) -->
                    <path d="M18 52 L38 60 L40 65 L15 55 Z" fill="var(--logo-bg)"/>
                    <path d="M42 65 L44 60 L65 52 L68 55 Z" fill="var(--logo-bg)"/>
                    <path d="M18 48 L36 57 L38 60 L18 52 Z" fill="var(--logo-bg)"/>
                    <path d="M44 60 L46 57 L65 48 L65 52 Z" fill="var(--logo-bg)"/>
                </svg>
                <span class="brand-name">PLAGIX</span>
            </a>
            <div style="display: flex; gap: 2rem; align-items: center;">
                <!-- Luxury Premium Theme Toggle -->
                <div class="premium-toggle" onclick="toggleTheme()" title="Switch Environment">
                    <div class="toggle-knob">
                        <div class="knob-craters">
                            <div class="k-crater k-1"></div>
                            <div class="k-crater k-2"></div>
                            <div class="k-crater k-3"></div>
                        </div>
                    </div>
                    <div class="toggle-bg-layers">
                        <div class="t-clouds">
                            <div class="t-cloud tc-1"></div>
                            <div class="t-cloud tc-2"></div>
                        </div>
                        <div class="t-stars">
                            <div class="t-star ts-1"></div>
                            <div class="t-star ts-2"></div>
                            <div class="t-star ts-3"></div>
                        </div>
                    </div>
                </div>
                
                {% if session.logged_in %}
                    {% if not is_index %}
                        <a href="/profile" class="btn btn-secondary" style="background: transparent; border-color: var(--text); color: var(--text); text-decoration: none;">Account Settings</a>
                    {% endif %}
                {% else %}
                    <a href="/auth" class="btn btn-magnetic" style="text-decoration: none;">Sign In</a>
                {% endif %}
            </div>
        </nav>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
